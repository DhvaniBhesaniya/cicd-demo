# .github/workflows/ci-cd.yml
#
# This pipeline runs on every push to `main` and on every Pull Request.
#
# Pipeline stages:
#   1. test   — compile & run tests
#   2. lint   — clippy (Rust linter) + rustfmt check
#   3. docker — build Docker image, push to Docker Hub
#   4. deploy — trigger Render deploy hook (deploy-on-merge to main only)

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Change this to your Docker Hub username/repo
  IMAGE_NAME: yourdockerhubuser/rust-axum-demo

jobs:
  # ─── Stage 1: Tests ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache the Cargo registry & build artifacts between runs
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all

  # ─── Stage 2: Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check

  # ─── Stage 3: Docker Build & Push ──────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, lint]          # only runs if tests & lint pass
    if: github.ref == 'refs/heads/main'   # only on merges to main

    steps:
      - uses: actions/checkout@v4

      # Enable BuildKit layer caching (much faster re-builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag with both 'latest' and the short commit SHA for traceability
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Re-use cached layers from previous builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── Stage 4: Deploy to Render ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [docker]              # only deploy after image is pushed

    steps:
      - name: Trigger Render deploy hook
        # Render gives you a unique deploy hook URL.
        # Store it as RENDER_DEPLOY_HOOK in GitHub Secrets.
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
